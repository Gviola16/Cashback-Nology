services:
  postgres:
    image: postgres:16-alpine
    container_name: cashvault_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cashback_user
      POSTGRES_PASSWORD: cashback_pass
      POSTGRES_DB: cashback_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashback_user -d cashback_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
